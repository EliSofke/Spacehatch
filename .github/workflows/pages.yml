name: pages

on:
  push:
    branches: [main]
    paths:
      - "frontend-browser-ssh/**"
      - "frontend-gh-wasm/**"
      - "frontend-ssh-wasm/**"
      - "gh-wasm-src/**"
      - "ssh-wasm-src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gh-wasm-src/go.mod
          cache-dependency-path: gh-wasm-src/go.sum
      - name: Build gh.wasm (unmodified go-gh -> GOOS=js)
        run: bash gh-wasm-src/build.sh
      - name: Build spacehatch-ssh.wasm (dev-tunnels + grpc-go + x/crypto/ssh -> GOOS=js)
        run: bash ssh-wasm-src/build.sh
      - name: Stamp build version into app.js
        run: |
          SHA="${GITHUB_SHA:0:7}"
          STAMP="${SHA} $(date -u +%Y-%m-%dT%H:%MZ)"
          sed -i "s|__BUILD_SHA__|${STAMP}|g" frontend-browser-ssh/app.js
          # Cache-bust the grpc ES module graph: version every relative import.
          find frontend-browser-ssh/grpc -name '*.js' -exec \
            sed -i "s|from \"\(\./[A-Za-z0-9_-]*\.js\)\"|from \"\1?v=${SHA}\"|g" {} +
          echo "stamped build: ${STAMP}"
      - name: Assemble Pages site (SSH app at /, gh terminal at /gh, Go-transport SSH at /ssh)
        run: |
          rm -rf _site && mkdir -p _site/gh _site/ssh
          cp -r frontend-browser-ssh/. _site/
          cp -r frontend-gh-wasm/. _site/gh/
          cp -r frontend-ssh-wasm/. _site/ssh/
          echo "site tree:"; find _site -maxdepth 2 -type f | sort
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
