name: pages

on:
  push:
    branches: [main]
    paths:
      - "frontend-ssh-wasm/**"
      - "ssh-wasm-src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ssh-wasm-src/go.mod
          cache-dependency-path: ssh-wasm-src/go.sum
      - name: Build spacehatch-ssh.wasm (dev-tunnels + grpc-go + x/crypto/ssh -> GOOS=js)
        run: bash ssh-wasm-src/build.sh
      - name: Assemble Pages site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r frontend-ssh-wasm/. _site/
          echo "site tree:"; find _site -maxdepth 2 -type f | sort
      - name: Write build metadata (version.json)
        run: |
          jq --arg commit "$(git rev-parse --short HEAD)" \
             --arg built "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             '. + {commit: $commit, built: $built}' \
             frontend-ssh-wasm/version.json > _site/version.json
          cat _site/version.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
