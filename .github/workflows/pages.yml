name: pages

on:
  push:
    branches: [main]
    paths:
      - "frontend-gh-wasm/**"
      - "frontend-ssh-wasm/**"
      - "gh-wasm-src/**"
      - "ssh-wasm-src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ssh-wasm-src/go.mod
          cache-dependency-path: ssh-wasm-src/go.sum
      - name: Build gh.wasm (unmodified go-gh -> GOOS=js)
        run: bash gh-wasm-src/build.sh
      - name: Build spacehatch-ssh.wasm (dev-tunnels + grpc-go + x/crypto/ssh -> GOOS=js)
        run: bash ssh-wasm-src/build.sh
      - name: Assemble Pages site (Go-transport SSH at /, gh terminal at /gh)
        run: |
          rm -rf _site && mkdir -p _site/gh
          cp -r frontend-ssh-wasm/. _site/
          cp -r frontend-gh-wasm/. _site/gh/
          echo "site tree:"; find _site -maxdepth 2 -type f | sort
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
