name: pages

on:
  push:
    branches: [main]
    paths: ["frontend-browser-ssh/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version into app.js
        run: |
          SHA="${GITHUB_SHA:0:7}"
          STAMP="${SHA} $(date -u +%Y-%m-%dT%H:%MZ)"
          sed -i "s|__BUILD_SHA__|${STAMP}|g" frontend-browser-ssh/app.js
          # Cache-bust the grpc ES module graph: version every relative import.
          find frontend-browser-ssh/grpc -name '*.js' -exec \
            sed -i "s|from \"\(\./[A-Za-z0-9_-]*\.js\)\"|from \"\1?v=${SHA}\"|g" {} +
          echo "stamped build: ${STAMP}"
          grep -n 'const BUILD' frontend-browser-ssh/app.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-browser-ssh
      - id: deployment
        uses: actions/deploy-pages@v4
