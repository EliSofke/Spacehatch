name: pages

on:
  push:
    branches: [main]
    paths: ["frontend-lite/**", "frontend-browser-ssh/**", "frontend-pure/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version into app.js
        run: |
          STAMP="${GITHUB_SHA:0:7} $(date -u +%Y-%m-%dT%H:%MZ)"
          sed -i "s|__BUILD_SHA__|${STAMP}|g" frontend-browser-ssh/app.js
          echo "stamped build: ${STAMP}"
          grep -n 'const BUILD' frontend-browser-ssh/app.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-browser-ssh
      - id: deployment
        uses: actions/deploy-pages@v4
