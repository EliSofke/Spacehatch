name: gh-wasm

# Build the gh-in-WASM module (GitHub's unmodified go-gh compiled to GOOS=js)
# so the 12.6 MB gh.wasm is produced by CI instead of committed to git.

on:
  push:
    branches: [main]
    paths: ["gh-wasm-src/**", "frontend-gh-wasm/**", ".github/workflows/gh-wasm.yml"]
  pull_request:
    paths: ["gh-wasm-src/**", "frontend-gh-wasm/**", ".github/workflows/gh-wasm.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gh-wasm-src/go.mod
          cache-dependency-path: gh-wasm-src/go.sum
      - name: Build gh.wasm (unmodified go-gh -> GOOS=js)
        run: bash gh-wasm-src/build.sh
      - name: Validate the wasm module
        run: |
          node -e 'const b=require("fs").readFileSync("frontend-gh-wasm/gh.wasm"); if(!WebAssembly.validate(b)){console.error("invalid wasm");process.exit(1);} console.log("valid wasm:",b.length,"bytes")'
      - uses: actions/upload-artifact@v4
        with:
          name: gh-wasm
          path: |
            frontend-gh-wasm/gh.wasm
            frontend-gh-wasm/wasm_exec.js
          if-no-files-found: error
