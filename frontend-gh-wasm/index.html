<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spacehatch — gh in WASM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0b0e14; color: #c8d3e0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    header { padding: .6rem .9rem; border-bottom: 1px solid #1c2333; display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    header b { color: #e6edf6; }
    input { background: #11151f; border: 1px solid #263049; color: #c8d3e0; border-radius: 6px; padding: .35rem .5rem; font: inherit; }
    #token { width: 22rem; }
    #cmd { width: 12rem; }
    button { background: #1f6feb; color: #fff; border: 0; border-radius: 6px; padding: .4rem .8rem; font: inherit; cursor: pointer; }
    #term { padding: .5rem; height: calc(100vh - 3.4rem); }
    .hint { color: #7d8aa0; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <b>gh</b><span class="hint">unmodified go-gh → WASM</span>
    <input id="token" type="password" placeholder="GitHub token (GH_TOKEN)" autocomplete="off" />
    <input id="cmd" value="api user" placeholder="api &lt;endpoint&gt;" />
    <button id="run">Run</button>
  </header>
  <div id="term"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="./wasm_exec.js"></script>
  <script type="module" src="./boot.js"></script>
</body>
</html>
