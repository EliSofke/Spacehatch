name = "spacehatch-auth"
main = "worker.js"
compatibility_date = "2025-01-01"

# Secrets are NOT set here. Set them out-of-band so they never touch the repo:
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET
# Public, non-secret config can live as a plain var:
[vars]
ALLOWED_ORIGIN = "https://elisofke.github.io"
