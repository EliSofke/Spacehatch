<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spacehatch — SSH (canonical Go transport)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0b0e14; color: #d7dae0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 10px 14px; }
    input { background: #0b0e14; color: #d7dae0; border: 1px solid #333; border-radius: 6px; padding: 6px 8px; font: inherit; }
    input#token { flex: 1 1 320px; }
    button { background: #7aa2f7; color: #0b0e14; border: 0; border-radius: 6px; padding: 7px 14px; font: inherit; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    #term { flex: 1 1 auto; min-height: 0; padding: 6px 2px 4px; display: flex; justify-content: center; }
    #sysinfo { display: flex; align-items: center; font: 18px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; padding: 3px 16px; overflow: hidden; border-top: 1px solid #161b26; }
    #sysinfo > .grp { white-space: nowrap; }
    #sysinfo > .left { flex: 0 0 auto; margin-right: .9ch; }
    #sysinfo > .mid { flex: 0 1 auto; min-width: 0; margin-right: .9ch; }
    #sysinfo > .right { flex: 0 0 auto; }
    #sysinfo .tail { flex: 1 1 auto; min-width: 0; }
    #sysinfo .clk { color: #729fcf; }
    #sysinfo a { color: inherit; text-decoration: none; }
    #sysinfo a:hover { text-decoration: underline; }
    #sysinfo:empty { display: none; }
  </style>
</head>
<body>
  <div class="row">
    <input id="token" type="password" placeholder="GitHub token (Codespaces read/write)" autocomplete="off" />
  </div>
  <div class="row">
    <input id="owner" placeholder="owner" size="14" />
    <input id="repo" placeholder="repo" size="18" />
    <button id="connect">Connect</button>
  </div>
  <div id="sysinfo"></div>
  <div id="term"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.min.js"></script>
  <script>
    // Optional deploy-time config (workerUrl, owner, repo). Pages injects this.
    window.SPACEHATCH_D_CONFIG = window.SPACEHATCH_D_CONFIG || {
      workerUrl: "https://spacehatch-auth.eli-sofke.workers.dev",
      owner: "EliSofke",
      repo: "Spacehatch"
    };
  </script>
  <script src="./wasm_exec.js"></script>
  <script type="module" src="./boot.js"></script>
</body>
</html>
